# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    app.share_dir: '%env(string:APP_SHARE_DIR)%'
    app.default_country_code: '%env(string:APP_DEFAULT_COUNTRY_CODE)%'
    app.contact_encryption_key: '%env(string:CONTACT_ENCRYPTION_KEY)%'
    app.contact_hash_key: '%env(string:CONTACT_HASH_KEY)%'
    app.sms_provider: '%env(string:SMS_PROVIDER)%'
    app.twilio.account_sid: '%env(string:SMS_PROVIDER_TWILIO_ACCOUNT_SID)%'
    app.twilio.auth_token: '%env(string:SMS_PROVIDER_TWILIO_AUTH_TOKEN)%'
    app.twilio.from: '%env(string:SMS_PROVIDER_TWILIO_FROM)%'
    app.push_provider: '%env(string:PUSH_PROVIDER)%'
    app.fcm.project_id: '%env(string:FCM_PROJECT_ID)%'
    app.fcm.service_account_json: '%env(string:FCM_SERVICE_ACCOUNT_JSON)%'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    App\Application\Contact\Handler\PhoneNumberNormalizer:
        arguments:
            $defaultCountryCode: '%app.default_country_code%'

    App\Application\Contact\Handler\ContactCryptoService:
        arguments:
            $encryptionSecret: '%app.contact_encryption_key%'
            $hashSecret: '%app.contact_hash_key%'

    App\Infrastructure\Sms\FakeSmsStore:
        arguments:
            $projectDir: '%kernel.project_dir%'
            $shareDir: '%app.share_dir%'

    App\Infrastructure\Sms\TwilioSmsGateway:
        arguments:
            $accountSid: '%app.twilio.account_sid%'
            $authToken: '%app.twilio.auth_token%'
            $from: '%app.twilio.from%'

    App\Infrastructure\Sms\DelegatingSmsGateway:
        arguments:
            $provider: '%app.sms_provider%'

    App\UI\Controller\DebugFakeSmsController:
        arguments:
            $appEnv: '%kernel.environment%'

    App\Domain\Sms\Port\SmsGatewayInterface: '@App\Infrastructure\Sms\DelegatingSmsGateway'

    App\Domain\Alert\Port\FallAlertRepositoryInterface: '@App\Infrastructure\Persistence\DoctrineFallAlertRepository'
    App\Domain\Alert\Port\SmsAttemptRepositoryInterface: '@App\Infrastructure\Persistence\DoctrineSmsAttemptRepository'
    App\Domain\Alert\Port\PushAttemptRepositoryInterface: '@App\Infrastructure\Persistence\DoctrinePushAttemptRepository'
    App\Domain\Alert\Port\AlertAcknowledgementRepositoryInterface: '@App\Infrastructure\Persistence\DoctrineAlertAcknowledgementRepository'
    App\Domain\Device\Port\DeviceRepositoryInterface: '@App\Infrastructure\Persistence\DoctrineDeviceRepository'
    App\Domain\Caregiver\Port\CaregiverInviteRepositoryInterface: '@App\Infrastructure\Persistence\DoctrineCaregiverInviteRepository'
    App\Domain\Caregiver\Port\CaregiverLinkRepositoryInterface: '@App\Infrastructure\Persistence\DoctrineCaregiverLinkRepository'
    App\Domain\Caregiver\Port\CaregiverPushTokenRepositoryInterface: '@App\Infrastructure\Persistence\DoctrineCaregiverPushTokenRepository'
    App\Domain\Contact\Port\EmergencyContactRepositoryInterface: '@App\Infrastructure\Persistence\DoctrineEmergencyContactRepository'

    App\Infrastructure\Push\FakePushStore:
        arguments:
            $projectDir: '%kernel.project_dir%'
            $shareDir: '%app.share_dir%'

    App\UI\Controller\DebugFakePushController:
        arguments:
            $appEnv: '%kernel.environment%'

    App\Infrastructure\Push\FcmPushGateway:
        arguments:
            $projectId: '%app.fcm.project_id%'
            $serviceAccountJson: '%app.fcm.service_account_json%'

    App\Infrastructure\Push\DelegatingPushGateway:
        arguments:
            $provider: '%app.push_provider%'

    App\Domain\Push\Port\PushGatewayInterface: '@App\Infrastructure\Push\DelegatingPushGateway'
