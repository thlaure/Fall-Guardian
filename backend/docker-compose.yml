services:
  app:
    build:
      context: .
      dockerfile: docker/frankenphp/Dockerfile.dev
    container_name: fall-guardian-backend-app
    restart: unless-stopped
    ports:
      - "8002:80"
      - "4445:443"
      - "4445:443/udp"
    volumes:
      - .:/app:cached
      - ./docker/frankenphp/php.ini:/usr/local/etc/php/conf.d/app.ini:ro
      - ./docker/frankenphp/xdebug.ini:/usr/local/etc/php/conf.d/xdebug.ini:ro
      - ./docker/frankenphp/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_DEBUG: ${APP_DEBUG:-1}
      APP_SECRET: ${APP_SECRET:-changeme}
      DATABASE_URL: postgresql://fall_guardian:fall_guardian@postgres:5432/fall_guardian?serverVersion=16&charset=utf8
      MESSENGER_TRANSPORT_DSN: redis://redis:6379/messages
      REDIS_URL: redis://redis:6379
      CONTACT_ENCRYPTION_KEY: ${CONTACT_ENCRYPTION_KEY:-change-me-encryption}
      CONTACT_HASH_KEY: ${CONTACT_HASH_KEY:-change-me-hash}
      APP_DEFAULT_COUNTRY_CODE: ${APP_DEFAULT_COUNTRY_CODE:-+33}
      SMS_PROVIDER_TWILIO_ACCOUNT_SID: ${SMS_PROVIDER_TWILIO_ACCOUNT_SID:-}
      SMS_PROVIDER_TWILIO_AUTH_TOKEN: ${SMS_PROVIDER_TWILIO_AUTH_TOKEN:-}
      SMS_PROVIDER_TWILIO_FROM: ${SMS_PROVIDER_TWILIO_FROM:-}
      FRANKENPHP_CONFIG: worker ./public/index.php
      SERVER_NAME: :80
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  messenger:
    build:
      context: .
      dockerfile: docker/frankenphp/Dockerfile.dev
    container_name: fall-guardian-backend-messenger
    restart: unless-stopped
    volumes:
      - .:/app:cached
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_SECRET: ${APP_SECRET:-changeme}
      DATABASE_URL: postgresql://fall_guardian:fall_guardian@postgres:5432/fall_guardian?serverVersion=16&charset=utf8
      MESSENGER_TRANSPORT_DSN: redis://redis:6379/messages
      REDIS_URL: redis://redis:6379
      CONTACT_ENCRYPTION_KEY: ${CONTACT_ENCRYPTION_KEY:-change-me-encryption}
      CONTACT_HASH_KEY: ${CONTACT_HASH_KEY:-change-me-hash}
      APP_DEFAULT_COUNTRY_CODE: ${APP_DEFAULT_COUNTRY_CODE:-+33}
      SMS_PROVIDER_TWILIO_ACCOUNT_SID: ${SMS_PROVIDER_TWILIO_ACCOUNT_SID:-}
      SMS_PROVIDER_TWILIO_AUTH_TOKEN: ${SMS_PROVIDER_TWILIO_AUTH_TOKEN:-}
      SMS_PROVIDER_TWILIO_FROM: ${SMS_PROVIDER_TWILIO_FROM:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c 'while true; do php bin/console messenger:consume async --time-limit=30 --memory-limit=256M -vv; done'

  postgres:
    image: postgres:16-alpine
    container_name: fall-guardian-backend-postgres
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: fall_guardian
      POSTGRES_PASSWORD: fall_guardian
      POSTGRES_DB: fall_guardian
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fall_guardian -d fall_guardian"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fall-guardian-backend-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
