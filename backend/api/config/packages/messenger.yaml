framework:
    messenger:
        failure_transport: failed

        transports:
            async: '%env(MESSENGER_TRANSPORT_DSN)%'
            failed: '%env(MESSENGER_FAILED_TRANSPORT_DSN)%'

        routing:
            App\Domain\Alert\Message\SendFallAlertPushMessage: async
            App\Domain\Caregiver\Message\NotifyCaregiverLinkRevokedMessage: async

when@test:
    framework:
        messenger:
            transports:
                async: 'sync://'
                failed: 'in-memory://'
