name: Caregiver Mobile CI

on:
  push:
    branches:
      - main
    paths:
      - apps/caregiver_mobile/**
      - .github/workflows/caregiver-mobile-ci.yaml
  pull_request:
    branches:
      - main
  workflow_dispatch: ~

concurrency:
  group: caregiver-mobile-ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect caregiver mobile changes
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect relevant changes
        id: filter
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" != "pull_request" ]; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          elif git diff --quiet "$BASE_SHA" "$GITHUB_SHA" -- \
            apps/caregiver_mobile \
            .github/workflows/caregiver-mobile-ci.yaml; then
            echo "relevant=false" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          fi

  quality:
    name: Caregiver Mobile Checks
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/caregiver_mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: beta
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run deterministic quality checks
        run: make quality

      - name: Build Android APK
        run: make build-android

  required-quality:
    name: Caregiver Mobile Quality
    needs:
      - changes
      - quality
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify caregiver mobile result
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          QUALITY_RESULT: ${{ needs.quality.result }}
          RELEVANT: ${{ needs.changes.outputs.relevant }}
        run: |
          test "$CHANGES_RESULT" = "success"
          if [ "$RELEVANT" = "true" ]; then
            test "$QUALITY_RESULT" = "success"
          else
            test "$QUALITY_RESULT" = "skipped"
          fi
