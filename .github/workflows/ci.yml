name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch: ~

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  flutter:
    name: Flutter
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_app
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed lib test

      - name: Run tests
        run: flutter test

      - name: Run static analysis
        run: flutter analyze

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker images
        run: docker compose -f docker-compose.yml build --no-cache

      - name: Start services
        run: |
          docker compose -f docker-compose.yml up -d
          echo "Waiting for services to be healthy..."
          sleep 10
          docker compose -f docker-compose.yml ps

      - name: Print logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml logs

      - name: Install Composer dependencies
        run: docker compose -f docker-compose.yml exec -T app composer install --no-interaction --no-progress --prefer-dist

      - name: Check HTTP reachability
        run: |
          for i in {1..10}; do
            if curl -s -f http://localhost:8002/health > /dev/null 2>&1; then
              echo "App is ready"
              break
            fi
            echo "Waiting for app... ($i/10)"
            sleep 2
          done
          curl -v --fail-with-body http://localhost:8002/health

      - name: Create test database
        run: docker compose -f docker-compose.yml exec -T app php bin/console -e test doctrine:database:create --if-not-exists

      - name: Run migrations
        run: docker compose -f docker-compose.yml exec -T app php bin/console -e test doctrine:migrations:migrate --no-interaction

      - name: Run unit tests
        run: docker compose -f docker-compose.yml exec -T app vendor/bin/phpunit --testsuite=Unit

      - name: Run CS Fixer (dry-run)
        run: docker compose -f docker-compose.yml exec -T app vendor/bin/php-cs-fixer fix --dry-run --diff --sequential

      - name: Run PHPStan
        run: docker compose -f docker-compose.yml exec -T app vendor/bin/phpstan analyse --no-progress --memory-limit=-1

      - name: YAML linter
        run: docker compose -f docker-compose.yml exec -T app php bin/console lint:yaml config

      - name: Stop services
        if: always()
        run: docker compose -f docker-compose.yml down -v

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  trivy:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build backend image
        run: docker build -f backend/docker/frankenphp/Dockerfile -t fall-guardian-backend:ci backend

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: fall-guardian-backend:ci
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Scan repository for misconfigurations
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL,HIGH

  docker-lint:
    name: Docker Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Lint backend Dockerfile (dev)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: backend/docker/frankenphp/Dockerfile.dev
          failure-threshold: error

      - name: Lint backend Dockerfile (prod)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: backend/docker/frankenphp/Dockerfile
          failure-threshold: error
