name: watchOS CI

on:
  push:
    branches:
      - main
    paths:
      - apps/watchos/**
      - .github/workflows/watchos-ci.yaml
  pull_request:
    branches:
      - main
  workflow_dispatch: ~

concurrency:
  group: watchos-ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect watchOS changes
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect relevant changes
        id: filter
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" != "pull_request" ]; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          elif git diff --quiet "$BASE_SHA" "$GITHUB_SHA" -- \
            apps/watchos \
            .github/workflows/watchos-ci.yaml; then
            echo "relevant=false" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          fi

  quality:
    name: watchOS Checks
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: macos-15
    defaults:
      run:
        working-directory: apps/watchos
    env:
      PROJECT: FallGuardian/FallGuardian.xcodeproj
      SCHEME: FallGuardian Watch App
      DESTINATION: generic/platform=watchOS Simulator
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Analyze
        run: make analyze

      - name: Build
        run: make build

  required-quality:
    name: watchOS Quality
    needs:
      - changes
      - quality
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify watchOS result
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          QUALITY_RESULT: ${{ needs.quality.result }}
          RELEVANT: ${{ needs.changes.outputs.relevant }}
        run: |
          test "$CHANGES_RESULT" = "success"
          if [ "$RELEVANT" = "true" ]; then
            test "$QUALITY_RESULT" = "success"
          else
            test "$QUALITY_RESULT" = "skipped"
          fi
